<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAC Physics | Student Records</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f4f0;
            --surface: #ffffff;
            --border: #dddbd4;
            --text: #1a1a18;
            --muted: #888880;
            --accent: #1a1a18;
            --present: #2d6a4f;
            --absent: #9b2335;
            --blue: #0369a1;
            --blue-bg: #e0f2fe;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 24px 16px;
        }

        .container { max-width: 620px; margin: auto; }

        .app-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
        .logo {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 600; font-size: 1.1em;
            background: var(--accent); color: white;
            padding: 6px 10px; border-radius: 6px;
        }
        .title { font-size: 1em; font-weight: 500; color: var(--muted); }

        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; padding: 16px; margin-bottom: 14px;
        }

        .field-label {
            font-size: 0.78em; font-weight: 600; color: var(--muted);
            letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px;
        }

        select, input {
            width: 100%; padding: 10px 12px;
            border: 1.5px solid var(--border); border-radius: 7px;
            font-family: 'IBM Plex Sans', sans-serif; font-size: 0.95em;
            background: var(--bg); color: var(--text); outline: none;
        }
        select:focus, input:focus { border-color: var(--accent); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
        .student-card {
            padding: 14px 10px; background: var(--surface); border: 1.5px solid var(--border);
            border-radius: 8px; text-align: center; cursor: pointer;
            transition: 0.15s; font-size: 0.88em; font-weight: 500;
        }
        .student-card:hover { transform: translateY(-2px); border-color: var(--blue); }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center; z-index: 100;
        }
        .modal-box {
            background: var(--surface);
            border-radius: 14px;
            padding: 24px;
            max-width: 600px;
            width: 95%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
        }

        .stats-summary {
            background: var(--bg); padding: 12px; border-radius: 8px;
            margin: 12px 0; font-size: 0.9em; display: flex; justify-content: space-around;
        }
        .stat-item { text-align: center; }
        .stat-item strong { display: block; font-size: 1.2em; color: var(--blue); }

        .history-list {
            max-height: 400px;
            overflow-y: auto;
            border-top: 1px solid var(--border);
            padding-top: 10px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
            gap: 12px;
        }

        .history-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            background: var(--bg);
            border-radius: 6px;
            font-size: 0.85em;
        }

        .status-p { color: var(--present); font-weight: 700; margin-left: auto; }
        .status-a { color: var(--absent); font-weight: 700; margin-left: auto; }

        .close-btn {
            width: 100%; padding: 12px; background: var(--accent); color: white;
            border: none; border-radius: 7px; cursor: pointer; font-weight: 600; margin-top: 16px;
        }
        .hidden { display: none !important; }

        /* ── Loading Animation ── */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-radius: 50%;
            border-top-color: var(--blue);
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Optional: Pulse effect for the status message */
        .loading-text {
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="app-header">
        <div class="logo">PAC</div>
        <div class="title">Individual Student Records</div>
    </div>

    <div class="card">
        <div class="field-label">Select Batch</div>
        <select id="batch-select" onchange="fetchStudents(this.value)">
            <option value="">— Choose Batch —</option>
        </select>
    </div>

    <div class="card">
        <div class="field-label">Search Student</div>
        <input type="text" id="search-input" placeholder="Type name to filter..." oninput="filterGrid(this.value)">
    </div>

    <div id="status-msg" style="text-align: center; font-size: 0.9em; color: var(--muted); margin-bottom: 10px;"></div>
    <div class="grid" id="student-grid"></div>
</div>

<div id="history-modal" class="modal-overlay hidden">
    <div class="modal-box">
        <h3 id="modal-student-name" style="font-family: 'IBM Plex Mono';">Student Name</h3>
        <div class="stats-summary">
            <div class="stat-item"><strong id="stat-percent">0%</strong>Attendance</div>
            <div class="stat-item"><strong id="stat-count">0/0</strong>Lectures</div>
        </div>
        <div class="history-list" id="history-content"></div>
        <button class="close-btn" onclick="closeModal()">Close Records</button>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwDMHXO3S0qITiLenz29Q4f_5--22ZWU0xd-A9Z-uuJoNjU6K_QNPqXSdzybo0KF_bl6A/exec";

    (async function init() {
        try {
            const res = await fetch(GAS_URL);
            const batches = await res.json();
            const select = document.getElementById('batch-select');
            batches.forEach(b => { select.innerHTML += `<option value="${b}">${b}</option>`; });
        } catch (e) { document.getElementById('status-msg').innerText = "Connection Error."; }
    })();

    async function fetchStudents(batch) {
        if (!batch) return;
        const grid = document.getElementById('student-grid');
        grid.innerHTML = "";
        
        updateStatus("Fetching student list...", true); // Show animation

        try {
            const res = await fetch(`${GAS_URL}?batch=${encodeURIComponent(batch)}`);
            const students = await res.json();
            
            students.forEach(s => {
                const name = typeof s === 'string' ? s : s.name;
                const card = document.createElement('div');
                card.className = 'student-card';
                card.innerText = name;
                card.onclick = () => showHistory(batch, name);
                grid.appendChild(card);
            });
            updateStatus(`${students.length} students found.`); // Hide animation
        } catch (e) { 
            updateStatus("Error loading students."); 
        }
    }

    function filterGrid(query) {
        const q = query.toLowerCase();
        document.querySelectorAll('.student-card').forEach(card => {
            card.style.display = card.innerText.toLowerCase().includes(q) ? 'block' : 'none';
        });
    }

    // FIXED: Function name and internal IDs to match HTML
    async function showHistory(batch, name) {
        const content = document.getElementById('history-content');
        content.innerHTML = ""; 
        
        updateStatus(`Retrieving records for ${name}...`, true); // Show animation

        try {
            const res = await fetch(`${GAS_URL}?batch=${encodeURIComponent(batch)}&action=getStudentHistory&name=${encodeURIComponent(name)}`);
            const history = await res.json(); 

            if (!history || history.length === 0) {
                updateStatus("No records found.");
                return;
            }

            document.getElementById('modal-student-name').innerText = name;
            
            let presentCount = 0;
            let htmlBuffer = "";

            history.reverse().forEach(entry => {
                const statusRaw = (entry.status || "").toString().trim().toUpperCase();
                const isP = statusRaw === "P" || statusRaw === "PRESENT";
                if (isP) presentCount++;
                
                htmlBuffer += `
                    <div class="history-item">
                        <span>${entry.date}</span>
                        <span class="${isP ? 'status-p' : 'status-a'}">${isP ? 'P' : 'A'}</span>
                    </div>`;
            });

            const total = history.length;
            document.getElementById('stat-percent').innerText = `${Math.round((presentCount / total) * 100)}%`;
            document.getElementById('stat-count').innerText = `${presentCount}/${total}`;
            
            content.innerHTML = htmlBuffer;
            document.getElementById('history-modal').classList.remove('hidden');
            updateStatus(""); // Hide animation

        } catch (e) {
            updateStatus("Failed to retrieve records.");
        }
    }

    function updateStatus(message, isLoading = false) {
        const msgEl = document.getElementById('status-msg');
        if (isLoading) {
            msgEl.innerHTML = `<div class="spinner"></div><span class="loading-text">${message}</span>`;
        } else {
            msgEl.innerText = message;
        }
    }


    function closeModal() { document.getElementById('history-modal').classList.add('hidden'); }
</script>
</body>
</html>
